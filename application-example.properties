# ============================================================
# Semtex - application-example.properties
# Copia este archivo como application.properties y completa los secretos locales.
# NO subas application.properties al repositorio (ya está en .gitignore).
# ============================================================

server.port=8080
spring.application.name=semtex-backend

# ---- Base de Datos PostgreSQL ----
spring.datasource.url=jdbc:postgresql://localhost:5432/semtex
spring.datasource.username=semtex
spring.datasource.password=semtex
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- Pool HikariCP ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# ---- Flyway ----
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Multipart upload ----
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ============================================================
# Seguridad — resource server validando el JWT de Supabase
# ============================================================
# Producción (Supabase real, firma asimétrica): valida contra el JWKS.
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=https://TU-PROYECTO.supabase.co/auth/v1/.well-known/jwks.json
spring.security.oauth2.resourceserver.jwt.issuer-uri=https://TU-PROYECTO.supabase.co/auth/v1

# Dev/tests (firma simétrica HS256). Si se define, se usa en lugar del JWKS.
# Debe tener >= 32 bytes para HS256.
semtex.jwt.hs256-secret=change-me-change-me-change-me-32-bytes
semtex.security.mode=hs256

# Claims donde viajan el tenant y el rol dentro del JWT de Supabase.
semtex.jwt.org-claim=org_id
semtex.jwt.role-claim=role

# ============================================================
# IA Local (Ollama + LangChain4j)
# ============================================================
semtex.ai.base-url=http://localhost:11434
semtex.ai.model=llama3.1:8b
semtex.ai.timeout-seconds=120
semtex.ai.max-context-records=200

# ============================================================
# Almacenamiento de archivos (S3 / MinIO en dev, Supabase Storage en prod)
# ============================================================
semtex.storage.endpoint=http://localhost:9000
semtex.storage.region=us-east-1
semtex.storage.bucket=semtex-documents
semtex.storage.access-key=minioadmin
semtex.storage.secret-key=minioadmin
semtex.storage.path-style-access=true

# ---- Email SMTP ----
semtex.email.from=noreply@semtex.app
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ---- OpenAPI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- CORS para frontend ----
semtex.cors.allowed-origins=http://localhost:3000,http://localhost:5173,http://localhost:4200

# ---- Actuator ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
