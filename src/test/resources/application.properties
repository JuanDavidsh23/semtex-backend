# Configuración de tests. La URL de datasource la inyecta Testcontainers vía @DynamicPropertySource.
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# Seguridad en modo HS256 (sin nube) para los tests de contexto.
semtex.security.mode=hs256
semtex.jwt.hs256-secret=test-secret-test-secret-test-secret-32-bytes
semtex.jwt.org-claim=org_id
semtex.jwt.role-claim=role

# Mail/IA/Storage: beans creados pero no usados en los tests (no se conectan al arrancar).
spring.mail.host=localhost
spring.mail.port=3025
semtex.ai.base-url=http://localhost:11434
semtex.ai.model=llama3.1:8b
semtex.storage.endpoint=http://localhost:9000

spring.jpa.open-in-view=true