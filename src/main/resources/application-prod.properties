# ============================================================
# Perfil de PRODUCCIÓN (Render / Docker).
# Se activa con SPRING_PROFILES_ACTIVE=prod (lo pone el Dockerfile).
# Toda la config sensible viene de VARIABLES DE ENTORNO que se pegan en Render.
# Sintaxis ${VAR} = obligatoria · ${VAR:default} = opcional con valor por defecto.
# ============================================================

server.port=${PORT:8080}
spring.application.name=semtex-backend

# ---- Base de Datos (Supabase). Usar el SESSION POOLER para IPv4 ----
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=${DB_POOL_MAX:5}

# ---- JPA / Flyway ----
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# ---- Upload ----
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

# ---- Seguridad: valida el JWT de Supabase (JWKS / ES256) ----
semtex.security.mode=supabase
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${SUPABASE_JWKS_URI}
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SUPABASE_ISSUER_URI}
spring.security.oauth2.resourceserver.jwt.jws-algorithms=ES256
semtex.jwt.org-claim=org_id
semtex.jwt.role-claim=app_role

# ---- CORS: dominios del frontend permitidos (separados por coma) ----
semtex.cors.allowed-origins=${SEMTEX_CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ---- IA: proveedor del chat. openai (por defecto) | ollama ----
semtex.ai.provider=${SEMTEX_AI_PROVIDER:openai}
# OpenAI (o Groq cambiando la base-url). OPENAI_API_KEY es SECRETA: ponla en Render, nunca en el front.
semtex.ai.openai.base-url=${SEMTEX_AI_OPENAI_BASE_URL:https://api.openai.com/v1}
semtex.ai.openai.api-key=${OPENAI_API_KEY:}
semtex.ai.openai.model=${SEMTEX_AI_OPENAI_MODEL:gpt-4o-mini}
# Ollama local (solo si SEMTEX_AI_PROVIDER=ollama)
semtex.ai.base-url=${SEMTEX_AI_BASE_URL:http://localhost:11434}
semtex.ai.model=${SEMTEX_AI_MODEL:llama3.1:8b}
semtex.ai.timeout-seconds=120
semtex.ai.max-context-records=200

# ---- Almacenamiento (S3/MinIO/Supabase Storage). Solo para subir documentos ----
semtex.storage.endpoint=${SEMTEX_STORAGE_ENDPOINT:http://localhost:9000}
semtex.storage.region=${SEMTEX_STORAGE_REGION:us-east-1}
semtex.storage.bucket=${SEMTEX_STORAGE_BUCKET:semtex-documents}
semtex.storage.access-key=${SEMTEX_STORAGE_ACCESS_KEY:minioadmin}
semtex.storage.secret-key=${SEMTEX_STORAGE_SECRET_KEY:minioadmin}
semtex.storage.path-style-access=true

# ---- Email SMTP. Solo para la herramienta enviarCorreo ----
semtex.email.from=${SEMTEX_EMAIL_FROM:noreply@semtex.app}
spring.mail.host=${SPRING_MAIL_HOST:localhost}
spring.mail.port=${SPRING_MAIL_PORT:1025}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# ---- OpenAPI ----
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ---- Actuator. Desactivamos el health de mail para que /actuator/health dé 200 ----
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.health.mail.enabled=false
